name: arena-analysis-api
region: nyc
features:
  - buildpack-stack=ubuntu-22
ingress:
  rules:
    - component:
        name: api
      match:
        path:
          prefix: /
services:
  - name: api
    dockerfile_path: scripts/arena_analysis/Dockerfile
    github:
      branch: main
      deploy_on_push: true
      repo: aureatechio/persona
    source_dir: scripts/arena_analysis
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /api/arena/health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      failure_threshold: 5
    envs:
      - key: ANTHROPIC_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: "${ANTHROPIC_API_KEY}"
      - key: OPENAI_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: "${OPENAI_API_KEY}"
      - key: TAVILY_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: "${TAVILY_API_KEY}"
      - key: SUPABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: "https://sobfplitrzgggzqsycew.supabase.co"
      - key: SUPABASE_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: "${SUPABASE_KEY}"
